name: Release

on:
  # This job runs when a new release is published
  release:
    types: [published]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  prePublishPackageTest:
    name: Prepublish package test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Retrieve dependencies from cache
        uses: actions/cache@v4
        id: cacheNpm
        with:
          path: |
            ~/.npm
            node_modules
          key: npm-v22-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('package.json') }}

      - name: Install Node.js and npm
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.cacheNpm.outputs.cache-hit != 'true'
        run: |
          npm update --no-save
          npm update --save-dev --no-save

      # Store the name of the release
      # See https://stackoverflow.com/questions/58177786/get-the-current-pushed-tag-in-github-actions
      - run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - run: npm version $RELEASE_VERSION --no-git-tag-version

      - name: Build local package
        run: echo "PACKAGE_TGZ=$(npm pack --silent)" >> $GITHUB_ENV

      - name: Run tests against version packaged with npm pack
        run: |
          PACKAGE_VERSION=${PACKAGE_TGZ#osls-}
          PACKAGE_VERSION=${PACKAGE_VERSION%.tgz}
          mkdir "serverless-${PACKAGE_VERSION}"
          tar zxf "$PACKAGE_TGZ" -C "serverless-${PACKAGE_VERSION}"
          cp -R test "serverless-${PACKAGE_VERSION}/package"
          ln -s "$(pwd)"/node_modules "serverless-${PACKAGE_VERSION}/package/node_modules"
          cd "serverless-${PACKAGE_VERSION}/package"
          script -e -c "npm test -- -b"

      - name: Upload tested tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: ${{ env.PACKAGE_TGZ }}
          if-no-files-found: error

  npmPublish:
    name: Publish to NPM
    needs: prePublishPackageTest
    runs-on: ubuntu-latest
    steps:
      - name: Download tested tarball
        uses: actions/download-artifact@v4
        with:
          name: npm-package

      - name: Install Node.js and npm
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Publish new version
        run: npm publish ./*.tgz --access public --tag=latest
